{% extends "base.html" %}
{% block title %}New password · WC26 Bracket{% endblock %}
{% block content %}
{% if validlink %}
<h1>Set a new password</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Update password</button>
</form>
{% else %}
<h1>Link invalid</h1>
<p>This reset link is invalid or expired. <a href="{% url 'password_reset' %}">Request a new one</a>.</p>
{% endif %}
{% endblock %}
