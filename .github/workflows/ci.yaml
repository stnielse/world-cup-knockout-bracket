name: CI to Trigger Render Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.13'
          cache: pip
      # Setup venv for 1:1 parity with developer experience.
      # make lint locally and make lint in ci run the exact same.
      - run: python -m venv .venv
      - run: .venv/bin/pip install -r requirements.txt
      - run: make lint
      - run: make check
      - run: make test
